services:
  url-parser:
    build:
      context: ../../.. 
      dockerfile: services/parser/docker/Dockerfile
    container_name: url-parser
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
    env_file:
      .env.docker
    volumes:
      - ~/.aws:/home/parser/.aws:ro
    restart: on-failure