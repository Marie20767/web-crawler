apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-initialiser
spec:
  replicas: 1
  selector:
    matchLabels:
      app: url-initialiser
  template:
    metadata:
      labels:
        app: url-initialiser
    spec:
      containers:
        - name: url-initialiser
          image: url-initialiser:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: url-initialiser-config
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"