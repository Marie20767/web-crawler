services:
  mongodb:
    image: mongo:7.0
    container_name: url-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    env_file: 
      .env.docker
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: