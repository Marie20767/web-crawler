name: Build

on:
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - service: initialiser
            image_name: url-initialiser
          - service: crawler
            image_name: url-crawler
          - service: parser
            image_name: url-parser

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build with Makefile + cache
        env:
          DOCKER_USER: marie207
          IMAGE_NAME: ${{ matrix.image_name }}
          GIT_HASH: ${{ github.sha }}
          CACHE_FROM: --cache-from=type=local,src=/tmp/.buildx-cache
          CACHE_TO: --cache-to=type=local,dest=/tmp/.buildx-cache,mode=max
        working-directory: services/${{ matrix.service }}
        run: make docker/ci-build